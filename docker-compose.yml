services:
  app:
    container_name: ibshi-qaqc
    # Nếu server lấy image được build sẵn từ ghcr.io (như setup trong GitHub Action auto deploy) thì bật dòng này và xoá phần block build: trên
    image: ghcr.io/liberico-ai/ibshi-qaqc:main
    ports:
      - "7160:7160" # Cân bằng tải nếu dùng Nginx (VD: "127.0.0.1:3005:3005")
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7160/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
