<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Libe Move SSR</title>
    <!--ssr-head-->
    <script>
      // Inline theme check — runs before first paint to prevent FOUC
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.backgroundColor = '#f8fafc';
        } else {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#0f1117';
        }
      })();
    </script>
    <style>
      #app-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #0f1117;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
      }
      .app-loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #3b82f6;
        animation: spin-loader 1s ease-in-out infinite;
        margin-bottom: 16px;
      }
      .app-loader-text {
        color: #9ca3af;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.05em;
        animation: pulse-text 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes spin-loader {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse-text {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
      }
      body { margin: 0; background-color: #0f1117; }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="app-loader-spinner"></div>
      <div class="app-loader-text">INITIALIZING...</div>
    </div>
    <div id="app"><!--ssr-outlet--></div>
    <script type="module" src="/src/entry-client.js"></script>
  </body>
</html>
